<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ATS Jobs Tracker</title>
  <style>
    :root { --bg:#070b1a; --card:#0f172aee; --line:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#22d3ee; --accent2:#a78bfa; }
    * { box-sizing: border-box; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; margin: 0; color: var(--text); background: radial-gradient(1000px 500px at 10% -10%, #155e75 0%, transparent 50%), radial-gradient(800px 400px at 100% 0%, #4c1d95 0%, transparent 45%), var(--bg); }
    .container { max-width: 1260px; margin: 0 auto; padding: 1.2rem 1rem 2rem; }
    .header { display:flex; justify-content:space-between; align-items:end; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; background:linear-gradient(130deg,#0f172a,#111827); border:1px solid #33415599; border-radius:18px; padding:1rem 1.1rem; box-shadow: 0 20px 60px #02061780; }
    h1 { margin: 0; font-size: clamp(1.6rem, 2.8vw, 2.4rem); letter-spacing: .2px; }
    .meta { color: var(--muted); margin:.35rem 0 0; }
    .header-actions { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
    .pages-link, .secondary-link { text-decoration:none; color:#04111d; background:linear-gradient(135deg,var(--accent),#67e8f9); padding:.58rem .85rem; border-radius:12px; font-weight:700; box-shadow:0 8px 24px #22d3ee3d; }
    .secondary-link { background:#1f2937; color:#cbd5e1; box-shadow:none; border:1px solid #334155; }
    .toolbar { display:grid; grid-template-columns: 1.6fr repeat(4, 1fr); gap:.55rem; margin:.9rem 0 1rem; background: var(--card); border:1px solid #334155aa; border-radius:16px; padding:.7rem; backdrop-filter: blur(6px); }
    .toolbar input,.toolbar select { padding:.62rem; border:1px solid #334155; border-radius:12px; background:#020617a8; color:var(--text); }
    .toolbar .toggle { display:flex; align-items:center; gap:.4rem; padding:.62rem; border:1px solid #334155; border-radius:12px; background:#020617a8; }
    .summary { margin:.2rem 0 .75rem; color:var(--muted); }
    .table-wrap { background:var(--card); border:1px solid #334155aa; border-radius:18px; overflow:auto; box-shadow:0 18px 50px #02061766; }
    table { border-collapse:collapse; width:100%; min-width:1080px; }
    th,td { border-bottom:1px solid #33415566; text-align:left; padding:.7rem; vertical-align:top; }
    th { background:#0b1226; color:#cbd5e1; position:sticky; top:0; z-index:1; }
    tbody tr:hover { background:#1e293b66; }
    .badge { display:inline-block; padding:.14rem .5rem; border-radius:999px; font-size:.74rem; margin:0 .25rem .25rem 0; border:1px solid transparent; }
    .tech { background:#083344; color:#67e8f9; border-color:#155e75; }
    .non-tech { background:#1e293b; color:#cbd5e1; border-color:#334155; }
    .function { background:#2e1065; color:#c4b5fd; border-color:#5b21b6; }
    .chief { background:#082f49; color:#bae6fd; border-color:#0c4a6e; }
    .new { background:#3f1d2e; color:#f9a8d4; border-color:#9d174d; }
    .load-status { color:var(--muted); padding:.75rem .1rem .1rem; font-size:.92rem; }
    .sentinel { height: 1px; }
    a { color:#67e8f9; }
    @media (max-width: 980px) { .toolbar { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <main class="container" data-base-path="">
    <header class="header">
      <div>
        <h1>ATS Jobs Tracker</h1>
        <p class="meta">16127 total jobs · 14 Chief of Staff matches · 0 adjacent strategy/ops matches · Generated 2026-03-13 14:16 UTC</p>
      </div>
      <div class="header-actions">
        <a class="secondary-link" href="../jobs.csv" download>Download CSV</a>
        
      </div>
    </header>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Search title/company/location" />
      <select id="platform"><option value="">All platforms</option><option>greenhouse</option><option>lever</option><option>ashby</option></select>
      <select id="technical"><option value="">All technicality</option><option value="yes">Technical</option><option value="no">Non-technical</option></select>
      <select id="function"><option value="">All functions</option><option>business-operations</option><option>program-management</option><option>product</option><option>engineering</option><option>finance</option><option>people-hr</option><option>other</option></select>
      <select id="freshness"><option value="">All time</option><option value="new">New since last run</option><option value="12h">First seen ≤12h</option><option value="24h">First seen ≤24h</option></select>
      <label class="toggle"><input id="showChiefSubset" type="checkbox" checked /> Chief of Staff subset</label>
      <label class="toggle"><input id="showStrategyOpsSubset" type="checkbox" checked /> Adjacent roles subset</label>
    </div>
    <p class="summary" id="summary">Loading jobs…</p>

    <section class="table-wrap">
      <table>
        <thead>
          <tr><th>Title</th><th>Company</th><th>Platform</th><th>Location</th><th>Posted</th><th>First seen</th><th>Flags</th><th>Link</th></tr>
        </thead>
        <tbody id="jobs-body"></tbody>
      </table>
    </section>
    <p id="load-status" class="load-status"></p>
    <div id="scroll-sentinel" class="sentinel"></div>
  </main>

  <script>
    const q = (id) => document.getElementById(id);
    const basePath = (document.querySelector('[data-base-path]')?.dataset.basePath || '').trim();
    const assetUrl = (filename) => {
      if (basePath) {
        return `${basePath.replace(/\/$/, '')}/${filename}`;
      }
      return `./${filename}`;
    };
    const CHUNK_SIZE = 100;
    const controls = ['search','platform','technical','function','freshness','showChiefSubset','showStrategyOpsSubset'].map(q);
    let allJobs = [];
    let chiefSubsetJobs = [];
    let strategyOpsSubsetJobs = [];
    let filteredJobs = [];
    let renderedCount = 0;

    const inHours = (iso, hours) => {
      const t = Date.parse(iso || '');
      if (!t) return false;
      return (Date.now() - t) <= (hours * 3600 * 1000);
    };

    const badge = (text, cls) => `<span class="badge ${cls}">${text}</span>`;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderRow(job) {
      const flags = [
        badge(job.is_technical ? 'Technical' : 'Non-technical', job.is_technical ? 'tech' : 'non-tech'),
        badge(job.job_function || 'other', 'function'),
      ];
      if (job.is_chief_of_staff) flags.push(badge('Chief of Staff', 'chief'));
      if (job.is_new) flags.push(badge('NEW', 'new'));

      return `<tr>
        <td>${escapeHtml(job.title || '')}</td>
        <td>${escapeHtml(job.company || '')}</td>
        <td>${escapeHtml(job.platform || '')}</td>
        <td>${escapeHtml(job.location || '')}</td>
        <td>${escapeHtml(job.posted_at || '—')}</td>
        <td>${escapeHtml(job.first_seen_at || '—')}</td>
        <td>${flags.join('')}</td>
        <td><a href="${escapeHtml(job.url || '')}" target="_blank" rel="noopener noreferrer">Apply</a></td>
      </tr>`;
    }

    function applyFilters() {
      const search = q('search').value.trim().toLowerCase();
      const platform = q('platform').value.toLowerCase();
      const technical = q('technical').value;
      const func = q('function').value.toLowerCase();
      const freshness = q('freshness').value;
      const showChiefSubset = q('showChiefSubset').checked;
      const showStrategyOpsSubset = q('showStrategyOpsSubset').checked;

      const subsetUrls = new Set();
      if (showChiefSubset) {
        chiefSubsetJobs.forEach((job) => subsetUrls.add(job.url || `chief:${job.platform || ''}:${job.company || ''}:${job.title || ''}`));
      }
      if (showStrategyOpsSubset) {
        strategyOpsSubsetJobs.forEach((job) => subsetUrls.add(job.url || `strategy:${job.platform || ''}:${job.company || ''}:${job.title || ''}`));
      }
      const subsetFilteringEnabled = showChiefSubset || showStrategyOpsSubset;

      filteredJobs = allJobs.filter((job) => {

        const text = [job.title || '', job.company || '', job.location || ''].join(' ').toLowerCase();
        if (search && !text.includes(search)) return false;
        if (platform && (job.platform || '').toLowerCase() !== platform) return false;
        if (technical && (job.is_technical ? 'yes' : 'no') !== technical) return false;
        if (func && (job.job_function || '').toLowerCase() !== func) return false;
        if (freshness === 'new' && !job.is_new) return false;
        if (freshness === '12h' && !inHours(job.first_seen_at, 12)) return false;
        if (freshness === '24h' && !inHours(job.first_seen_at, 24)) return false;
        if (subsetFilteringEnabled) {
          const key = job.url || `${job.platform || ""}:${job.company || ""}:${job.title || ""}`;
          if (!subsetUrls.has(key) && !subsetUrls.has(`chief:${key}`) && !subsetUrls.has(`strategy:${key}`)) return false;
        }
        return true;
      });

      q('jobs-body').innerHTML = '';
      renderedCount = 0;
      renderNextChunk();
    }

    function renderNextChunk() {
      if (renderedCount >= filteredJobs.length) {
        q('load-status').innerText = `Loaded all ${filteredJobs.length} matching jobs.`;
        return;
      }

      const next = filteredJobs.slice(renderedCount, renderedCount + CHUNK_SIZE);
      q('jobs-body').insertAdjacentHTML('beforeend', next.map(renderRow).join(''));
      renderedCount += next.length;
      q('summary').innerText = `Showing ${filteredJobs.length} of ${allJobs.length} jobs.`;
      q('load-status').innerText = `Rendered ${renderedCount}/${filteredJobs.length} matching jobs (${CHUNK_SIZE} at a time).`;
    }

    async function loadJobs() {
      try {
        const [allResponse, chiefResponse, strategyResponse] = await Promise.all([
          fetch('../jobs.json', { cache: 'no-store' }),
          fetch('../jobs_chief_of_staff.json', { cache: 'no-store' }),
          fetch('../jobs_strategy_ops.json', { cache: 'no-store' }),
        ]);
        if (!allResponse.ok) throw new Error(`jobs.json HTTP ${allResponse.status}`);
        if (!chiefResponse.ok) throw new Error(`jobs_chief_of_staff.json HTTP ${chiefResponse.status}`);
        if (!strategyResponse.ok) throw new Error(`jobs_strategy_ops.json HTTP ${strategyResponse.status}`);

        const [allData, chiefData, strategyData] = await Promise.all([
          allResponse.json(),
          chiefResponse.json(),
          strategyResponse.json(),
        ]);
        allJobs = Array.isArray(allData) ? allData : [];
        chiefSubsetJobs = Array.isArray(chiefData) ? chiefData : [];
        strategyOpsSubsetJobs = Array.isArray(strategyData) ? strategyData : [];
      } catch (err) {
        q('summary').innerText = 'Failed to load jobs artifacts.';
        q('load-status').innerText = `Error: ${err}`;
        return;
      }

      controls.forEach((el) => el.addEventListener('input', applyFilters));
      controls.forEach((el) => el.addEventListener('change', applyFilters));
      applyFilters();

      const sentinel = q('scroll-sentinel');
      const observer = new IntersectionObserver((entries) => {
        if (entries.some((entry) => entry.isIntersecting)) renderNextChunk();
      }, { rootMargin: '400px' });
      observer.observe(sentinel);
    }

    q('download-csv').href = assetUrl('jobs.csv');
    loadJobs();
  </script>
</body>
</html>
