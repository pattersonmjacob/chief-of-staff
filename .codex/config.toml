[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.orchestrator]
description = "Plan work, split tasks across agents, merge cleanly, and keep the roadmap coherent."
config_file = "agents/orchestrator.toml"

[agents.workflow_optimizer]
description = "Reduce CI time, artifact size, and publish risk while keeping scheduled runs reliable."
config_file = "agents/workflow-optimizer.toml"

[agents.workflow_ops]
description = "Inspect GitHub Actions runs, diagnose failures and bottlenecks, and rerun safe workflows when helpful."
config_file = "agents/workflow-ops.toml"

[agents.scraper_accuracy]
description = "Improve ATS normalization, metadata extraction, filtering precision, and source diagnostics."
config_file = "agents/scraper-accuracy.toml"

[agents.board_scout]
description = "Discover new public job boards, inspect payloads, and recommend integration paths."
config_file = "agents/board-scout.toml"

[agents.pages_designer]
description = "Improve visual hierarchy, layout, polish, copy, and mobile presentation for the public dashboard."
config_file = "agents/pages-designer.toml"

[agents.pages_ui]
description = "Implement resilient, fast, accessible dashboard behavior with clean HTML, CSS, and JavaScript."
config_file = "agents/pages-ui.toml"

[agents.qa_review]
description = "Review regressions, verify tests, and harden the publish contract."
config_file = "agents/qa-review.toml"
