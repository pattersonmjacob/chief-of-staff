name: Refresh company source list

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build merged source CSV from ATS lists
        run: |
          python src/build_sources.py --output data/company_slugs.csv \
            --lever-url https://raw.githubusercontent.com/stapply-ai/ats-scrapers/main/lever/lever_companies.csv \
            --greenhouse-url https://raw.githubusercontent.com/stapply-ai/ats-scrapers/main/greenhouse/greenhouse_companies.csv

      - name: Validate and preview source CSV
        run: |
          python - <<'PY'
          import csv
          from collections import Counter

          path = "data/company_slugs.csv"
          with open(path, newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          required = ["slug", "vendor", "company", "url", "board_url", "open_jobs"]
          missing = [c for c in required if c not in (rows[0].keys() if rows else [])]
          if missing:
              raise SystemExit(f"Missing required columns: {missing}")

          counts = Counter((r.get("vendor") or "").strip() for r in rows)
          print(f"[info] Source rows: total={len(rows)} greenhouse={counts.get('Greenhouse',0)} lever={counts.get('Lever',0)}")

          missing_source_url = sum(1 for r in rows if not (r.get("url") or "").strip())
          missing_board_url = sum(1 for r in rows if not (r.get("board_url") or "").strip())
          print(f"[info] Missing source url rows: {missing_source_url}")
          print(f"[info] Missing board url rows: {missing_board_url}")

          print("[info] Preview (vendor | slug | source_url | board_url):")
          for row in rows[:25]:
              print(
                  f"[info] {row.get('vendor','')} | {row.get('slug','')} | "
                  f"{row.get('url','<none>')} | {row.get('board_url','<none>')}"
              )
          PY

      - name: Commit refreshed source CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/company_slugs.csv
          git diff --cached --quiet || git commit -m "chore: refresh company source list"
          git push
