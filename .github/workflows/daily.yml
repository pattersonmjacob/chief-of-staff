name: Daily jobs digest

on:
  schedule:
    - cron: "15 12 * * *"
    - cron: "30 12 * * 0"
  workflow_dispatch:
    inputs:
      validate_links:
        description: "Enable job-link validation for this run"
        required: false
        default: false
        type: boolean
      max_sources:
        description: "Optional cap for sources processed per chunk (empty = uncapped)"
        required: false
        default: ""
        type: string
      max_sources_per_platform:
        description: "Optional per-platform cap (empty = uncapped)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  SOURCES_CSV: data/company_slugs.csv
  MAX_SOURCES: ""
  MAX_SOURCES_PER_PLATFORM: ""
  SCRAPE_CONCURRENCY: 3
  MIN_REQUEST_INTERVAL_SECONDS: 0.8
  REQUEST_TIMEOUT_SECONDS: 25
  VALIDATE_JOB_LINKS: "false"
  LINK_CHECK_DELAY_SECONDS: 0.8
  MAX_JOB_AGE_DAYS: 7

jobs:
  resolve-run-config:
    runs-on: ubuntu-latest
    outputs:
      validate_links: ${{ steps.resolve.outputs.validate_links }}
      max_sources: ${{ steps.resolve.outputs.max_sources }}
      max_sources_per_platform: ${{ steps.resolve.outputs.max_sources_per_platform }}
    steps:
      - name: Resolve runtime settings
        id: resolve
        run: |
          VALIDATE="false"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 12 * * 0" ]; then
            VALIDATE="true"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.validate_links }}" = "true" ]; then
            VALIDATE="true"
          fi
          MAX_SOURCES_VALUE="${MAX_SOURCES}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.max_sources }}" ]; then
            MAX_SOURCES_VALUE="${{ inputs.max_sources }}"
          fi
          MAX_PER_PLATFORM_VALUE="${MAX_SOURCES_PER_PLATFORM}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.max_sources_per_platform }}" ]; then
            MAX_PER_PLATFORM_VALUE="${{ inputs.max_sources_per_platform }}"
          fi
          echo "validate_links=${VALIDATE}" >> "$GITHUB_OUTPUT"
          echo "max_sources=${MAX_SOURCES_VALUE}" >> "$GITHUB_OUTPUT"
          echo "max_sources_per_platform=${MAX_PER_PLATFORM_VALUE}" >> "$GITHUB_OUTPUT"
          echo "[info] Link validation enabled in aggregate job: ${VALIDATE}"
          echo "[info] Max sources per chunk: ${MAX_SOURCES_VALUE:-<uncapped>}"
          echo "[info] Max sources per platform: ${MAX_PER_PLATFORM_VALUE:-<uncapped>}"

  scrape-greenhouse:
    runs-on: ubuntu-latest
    needs: resolve-run-config
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - chunk_index: 0
            source_offset: 0
          - chunk_index: 1
            source_offset: 1000
          - chunk_index: 2
            source_offset: 2000
          - chunk_index: 3
            source_offset: 3000
          - chunk_index: 4
            source_offset: 4000
          - chunk_index: 5
            source_offset: 5000
          - chunk_index: 6
            source_offset: 6000
          - chunk_index: 7
            source_offset: 7000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest (Greenhouse)
        env:
          PLATFORM_FILTER: greenhouse
          SOURCE_OFFSET: ${{ matrix.source_offset }}
          MAX_SOURCES: ${{ needs.resolve-run-config.outputs.max_sources }}
          MAX_SOURCES_PER_PLATFORM: ${{ needs.resolve-run-config.outputs.max_sources_per_platform }}
        run: python src/fetch_chunk.py

      - name: Save chunk outputs
        run: |
          mkdir -p chunk
          cp jobs.json chunk/jobs_greenhouse_${{ matrix.chunk_index }}.json

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-chunk-greenhouse-${{ matrix.chunk_index }}
          path: chunk/jobs_greenhouse_${{ matrix.chunk_index }}.json
          if-no-files-found: error

  scrape-lever:
    runs-on: ubuntu-latest
    needs: resolve-run-config
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - chunk_index: 0
            source_offset: 0
          - chunk_index: 1
            source_offset: 1000
          - chunk_index: 2
            source_offset: 2000
          - chunk_index: 3
            source_offset: 3000
          - chunk_index: 4
            source_offset: 4000
          - chunk_index: 5
            source_offset: 5000
          - chunk_index: 6
            source_offset: 6000
          - chunk_index: 7
            source_offset: 7000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest (Lever)
        env:
          PLATFORM_FILTER: lever
          SOURCE_OFFSET: ${{ matrix.source_offset }}
          MAX_SOURCES: ${{ needs.resolve-run-config.outputs.max_sources }}
          MAX_SOURCES_PER_PLATFORM: ${{ needs.resolve-run-config.outputs.max_sources_per_platform }}
        run: python src/fetch_chunk.py

      - name: Save chunk outputs
        run: |
          mkdir -p chunk
          cp jobs.json chunk/jobs_lever_${{ matrix.chunk_index }}.json

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-chunk-lever-${{ matrix.chunk_index }}
          path: chunk/jobs_lever_${{ matrix.chunk_index }}.json
          if-no-files-found: error

  aggregate-and-publish:
    runs-on: ubuntu-latest
    needs:
      - resolve-run-config
      - scrape-greenhouse
      - scrape-lever
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jobs-chunk-*
          path: chunk-artifacts
          merge-multiple: true

      - name: Merge chunk outputs and rebuild artifacts (link validation enabled)
        if: needs.resolve-run-config.outputs.validate_links == 'true'
        run: |
          python src/aggregate_chunks.py \
            --chunks-dir chunk-artifacts \
            --repository "${{ github.repository }}" \
            --link-check-delay-seconds "${LINK_CHECK_DELAY_SECONDS}" \
            --max-job-age-days "${MAX_JOB_AGE_DAYS}"

      - name: Merge chunk outputs and rebuild artifacts (link validation disabled)
        if: needs.resolve-run-config.outputs.validate_links != 'true'
        run: |
          python src/aggregate_chunks.py \
            --chunks-dir chunk-artifacts \
            --repository "${{ github.repository }}" \
            --link-check-delay-seconds "${LINK_CHECK_DELAY_SECONDS}" \
            --disable-link-validation

      - name: Commit generated files
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json jobs.csv jobs_chief_of_staff.json jobs_chief_of_staff.csv jobs_strategy_ops.json jobs_strategy_ops.csv data/run_meta.json data/aggregate_summary.json docs/index.html docs/data README.md
          git diff --cached --quiet || git commit -m "chore: update daily jobs digest"
          git push
