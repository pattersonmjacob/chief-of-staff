name: Daily jobs digest

on:
  schedule:
    - cron: "15 12 * * *"
    - cron: "30 12 * * 0"
  workflow_dispatch:
    inputs:
      validate_links:
        description: "Enable job-link validation for this run"
        required: false
        default: false
        type: boolean
      max_sources:
        description: "Optional cap for sources processed per chunk (empty = default 1000)"
        required: false
        default: ""
        type: string
      max_sources_per_platform:
        description: "Optional per-platform cap (empty = uncapped)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  SOURCES_CSV: data/company_slugs.csv
  MAX_SOURCES: "1000"
  MAX_SOURCES_PER_PLATFORM: ""
  SCRAPE_CONCURRENCY: 3
  MIN_REQUEST_INTERVAL_SECONDS: 0.8
  REQUEST_TIMEOUT_SECONDS: 25
  VALIDATE_JOB_LINKS: "false"
  LINK_CHECK_DELAY_SECONDS: 0.8
  MAX_JOB_AGE_DAYS: 13

concurrency:
  group: daily-jobs-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-run-config:
    runs-on: ubuntu-latest
    outputs:
      validate_links: ${{ steps.resolve.outputs.validate_links }}
      max_sources: ${{ steps.resolve.outputs.max_sources }}
      max_sources_per_platform: ${{ steps.resolve.outputs.max_sources_per_platform }}
      greenhouse_matrix: ${{ steps.resolve.outputs.greenhouse_matrix }}
      lever_matrix: ${{ steps.resolve.outputs.lever_matrix }}
    steps:
      - name: Resolve runtime settings
        id: resolve
        env:
          SOURCES_CSV: ${{ env.SOURCES_CSV }}
          MAX_SOURCES: ${{ env.MAX_SOURCES }}
          MAX_SOURCES_PER_PLATFORM: ${{ env.MAX_SOURCES_PER_PLATFORM }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_VALIDATE_LINKS: ${{ inputs.validate_links }}
          INPUT_MAX_SOURCES: ${{ inputs.max_sources }}
          INPUT_MAX_SOURCES_PER_PLATFORM: ${{ inputs.max_sources_per_platform }}
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          def parse_optional_positive_int(value: str) -> int | None:
              text = (value or "").strip()
              if not text:
                  return None
              parsed = int(text)
              return parsed if parsed > 0 else None

          event_name = os.environ["EVENT_NAME"]
          event_schedule = os.environ.get("EVENT_SCHEDULE", "")
          validate_links = (
              (event_name == "schedule" and event_schedule == "30 12 * * 0")
              or (event_name == "workflow_dispatch" and os.environ.get("INPUT_VALIDATE_LINKS", "") == "true")
          )

          max_sources = parse_optional_positive_int(
              os.environ.get("INPUT_MAX_SOURCES") if event_name == "workflow_dispatch" else os.environ.get("MAX_SOURCES", "")
          ) or 1000
          max_sources_per_platform = parse_optional_positive_int(
              os.environ.get("INPUT_MAX_SOURCES_PER_PLATFORM")
              if event_name == "workflow_dispatch"
              else os.environ.get("MAX_SOURCES_PER_PLATFORM", "")
          )

          vendor_map = {"greenhouse": "greenhouse", "lever": "lever"}
          counts = {"greenhouse": 0, "lever": 0}
          seen = set()
          with Path(os.environ["SOURCES_CSV"]).open(newline="", encoding="utf-8") as f:
              for row in csv.DictReader(f):
                  vendor = vendor_map.get((row.get("vendor", "") or "").strip().lower())
                  slug = (row.get("slug", "") or "").strip().lower()
                  if not vendor or not slug:
                      continue
                  try:
                      open_jobs = int(str(row.get("open_jobs") or row.get("job_count") or 0).strip())
                  except ValueError:
                      open_jobs = 0
                  if open_jobs < 1:
                      continue
                  key = (vendor, slug)
                  if key in seen:
                      continue
                  seen.add(key)
                  if max_sources_per_platform is not None and counts[vendor] >= max_sources_per_platform:
                      continue
                  counts[vendor] += 1

          def build_matrix(total_sources: int) -> str:
              chunk_count = max(1, math.ceil(total_sources / max_sources)) if total_sources else 1
              matrix = {
                  "include": [
                      {"chunk_index": idx, "source_offset": idx * max_sources}
                      for idx in range(chunk_count)
                  ]
              }
              return json.dumps(matrix, separators=(",", ":"))

          outputs = {
              "validate_links": "true" if validate_links else "false",
              "max_sources": str(max_sources),
              "max_sources_per_platform": "" if max_sources_per_platform is None else str(max_sources_per_platform),
              "greenhouse_matrix": build_matrix(counts["greenhouse"]),
              "lever_matrix": build_matrix(counts["lever"]),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              for key, value in outputs.items():
                  f.write(f"{key}={value}\n")

          print(f"[info] Link validation enabled in aggregate job: {outputs['validate_links']}")
          print(f"[info] Max sources per chunk: {max_sources}")
          print(f"[info] Max sources per platform: {outputs['max_sources_per_platform'] or '<uncapped>'}")
          print(f"[info] Source counts after caps: greenhouse={counts['greenhouse']} lever={counts['lever']}")
          print(f"[info] Greenhouse matrix: {outputs['greenhouse_matrix']}")
          print(f"[info] Lever matrix: {outputs['lever_matrix']}")
          PY

  scrape-greenhouse:
    runs-on: ubuntu-latest
    needs: resolve-run-config
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.resolve-run-config.outputs.greenhouse_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest (Greenhouse)
        env:
          PLATFORM_FILTER: greenhouse
          SOURCE_OFFSET: ${{ matrix.source_offset }}
          MAX_SOURCES: ${{ needs.resolve-run-config.outputs.max_sources }}
          MAX_SOURCES_PER_PLATFORM: ${{ needs.resolve-run-config.outputs.max_sources_per_platform }}
        run: python src/fetch_chunk.py

      - name: Save chunk outputs
        run: |
          mkdir -p chunk
          cp jobs.json chunk/jobs_greenhouse_${{ matrix.chunk_index }}.json

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-chunk-greenhouse-${{ matrix.chunk_index }}
          path: chunk/jobs_greenhouse_${{ matrix.chunk_index }}.json
          if-no-files-found: error

  scrape-lever:
    runs-on: ubuntu-latest
    needs: resolve-run-config
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.resolve-run-config.outputs.lever_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest (Lever)
        env:
          PLATFORM_FILTER: lever
          SOURCE_OFFSET: ${{ matrix.source_offset }}
          MAX_SOURCES: ${{ needs.resolve-run-config.outputs.max_sources }}
          MAX_SOURCES_PER_PLATFORM: ${{ needs.resolve-run-config.outputs.max_sources_per_platform }}
        run: python src/fetch_chunk.py

      - name: Save chunk outputs
        run: |
          mkdir -p chunk
          cp jobs.json chunk/jobs_lever_${{ matrix.chunk_index }}.json

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-chunk-lever-${{ matrix.chunk_index }}
          path: chunk/jobs_lever_${{ matrix.chunk_index }}.json
          if-no-files-found: error

  aggregate-and-publish:
    runs-on: ubuntu-latest
    needs:
      - resolve-run-config
      - scrape-greenhouse
      - scrape-lever
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jobs-chunk-*
          path: chunk-artifacts
          merge-multiple: true

      - name: Merge chunk outputs and rebuild artifacts (link validation enabled)
        if: needs.resolve-run-config.outputs.validate_links == 'true'
        run: |
          python src/aggregate_chunks.py \
            --chunks-dir chunk-artifacts \
            --repository "${{ github.repository }}" \
            --link-check-delay-seconds "${LINK_CHECK_DELAY_SECONDS}" \
            --max-job-age-days "${MAX_JOB_AGE_DAYS}"

      - name: Merge chunk outputs and rebuild artifacts (link validation disabled)
        if: needs.resolve-run-config.outputs.validate_links != 'true'
        run: |
          python src/aggregate_chunks.py \
            --chunks-dir chunk-artifacts \
            --repository "${{ github.repository }}" \
            --link-check-delay-seconds "${LINK_CHECK_DELAY_SECONDS}" \
            --disable-link-validation

      - name: Commit generated files
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json jobs.csv jobs_chief_of_staff.json jobs_chief_of_staff.csv jobs_strategy_ops.json jobs_strategy_ops.csv data/run_meta.json data/aggregate_summary.json docs/index.html docs/data README.md
          git diff --cached --quiet || git commit -m "chore: update daily jobs digest"
          git push
