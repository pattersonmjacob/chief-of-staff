name: Daily jobs digest

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - chunk_index: 0
            source_offset: 0
          - chunk_index: 1
            source_offset: 1000
          - chunk_index: 2
            source_offset: 2000
          - chunk_index: 3
            source_offset: 3000
          - chunk_index: 4
            source_offset: 4000
          - chunk_index: 5
            source_offset: 5000
          - chunk_index: 6
            source_offset: 6000
          - chunk_index: 7
            source_offset: 7000
    env:
      SOURCES_CSV: data/company_slugs.csv
      MAX_SOURCES: 1000
      SOURCE_OFFSET: ${{ matrix.source_offset }}
      SCRAPE_CONCURRENCY: 8
      MIN_REQUEST_INTERVAL_SECONDS: 0.35
      MAX_SOURCES_PER_PLATFORM: 500
      VALIDATE_JOB_LINKS: "true"
      LINK_CHECK_DELAY_SECONDS: 0.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest
        run: |
          SOURCES_CSV=data/company_slugs.csv \
          MAX_SOURCES=1000 \
          SOURCE_OFFSET=${{ matrix.source_offset }} \
          SCRAPE_CONCURRENCY=8 \
          MIN_REQUEST_INTERVAL_SECONDS=0.35 \
          MAX_SOURCES_PER_PLATFORM=500 \
          VALIDATE_JOB_LINKS=true \
          LINK_CHECK_DELAY_SECONDS=0.8 \
          python src/main.py

      - name: Save chunk outputs
        run: |
          mkdir -p chunk
          cp jobs.json chunk/jobs_${{ matrix.chunk_index }}.json

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-chunk-${{ matrix.chunk_index }}
          path: chunk/jobs_${{ matrix.chunk_index }}.json
          if-no-files-found: error

  aggregate-and-publish:
    runs-on: ubuntu-latest
    needs: scrape-and-publish
    env:
      LINK_CHECK_DELAY_SECONDS: 0.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jobs-chunk-*
          path: chunk-artifacts
          merge-multiple: true

      - name: Merge chunk outputs and rebuild artifacts
        run: |
          python src/aggregate_chunks.py \
            --chunks-dir chunk-artifacts \
            --repository "${{ github.repository }}" \
            --link-check-delay-seconds "${LINK_CHECK_DELAY_SECONDS}"

      - name: Commit generated files
        run: |
          SMTP_FROM="${{ secrets.SMTP_FROM }}"
          SMTP_TO="${{ secrets.SMTP_TO }}"
          SMTP_HOST="${{ secrets.SMTP_HOST }}"
          SMTP_PORT="${{ secrets.SMTP_PORT }}"
          SMTP_USER="${{ secrets.SMTP_USER }}"
          SMTP_PASS="${{ secrets.SMTP_PASS }}"

          export SMTP_FROM SMTP_TO SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json jobs.csv docs/index.html
          git diff --cached --quiet || git commit -m "chore: update daily jobs digest"
          git push
