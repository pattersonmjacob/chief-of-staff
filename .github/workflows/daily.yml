name: Daily jobs digest

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    env:
      SOURCES_CSV: data/company_slugs.csv
      SCRAPE_CONCURRENCY: 1
      MIN_REQUEST_INTERVAL_SECONDS: 0.35
      MAX_SOURCES_PER_PLATFORM: 500
      VALIDATE_JOB_LINKS: "true"
      LINK_CHECK_DELAY_SECONDS: 0.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper digest
        run: python src/main.py

      - name: Commit generated files
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs.json jobs.csv docs/index.html
          git diff --cached --quiet || git commit -m "chore: update daily jobs digest"
          git push
